<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Noughts & Crosses</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 25px;
  font-size: 36px;
}

.menu {
  margin-top: 40px;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  background: #0ea5e9;
}

.board {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 8px;
  justify-content: center;
  margin-top: 25px;
}

.cell {
  width: 110px;
  height: 110px;
  background: #1f2937;
  font-size: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.2s;
}

.cell:hover {
  background: #334155;
}

.winning {
  background: #22c55e !important;
  color: black;
}

#status {
  margin-top: 20px;
  font-size: 22px;
  min-height: 30px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🎮 Noughts & Crosses</h1>

<div id="menu" class="menu">
  <button onclick="startGame('pvp')">2 Player</button>
  <button onclick="startGame('ai')">Play vs AI</button>
</div>

<div id="game" class="hidden">
  <div class="board" id="board"></div>
  <div id="status"></div>
  <button onclick="resetGame()">Restart</button>
</div>

<script>
let board = Array(9).fill("");
let currentPlayer = "X";
let gameMode = "pvp";
let gameActive = true;

const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function startGame(mode) {
  gameMode = mode;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  createBoard();
  updateStatus();
}

function createBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((val, i) => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.innerText = val;
    cell.addEventListener("click", () => makeMove(i));
    boardDiv.appendChild(cell);
  });
}

function makeMove(i) {
  if (!gameActive || board[i] !== "") return;

  board[i] = currentPlayer;
  checkGame();

  if (!gameActive) {
    createBoard();
    return;
  }

  if (gameMode === "pvp") {
    currentPlayer = currentPlayer === "X" ? "O" : "X";
  } else {
    currentPlayer = "O";
    createBoard();
    updateStatus();
    setTimeout(aiMove, 300);
    return;
  }

  createBoard();
  updateStatus();
}

function aiMove() {
  if (!gameActive) return;

  let move = findWinningMove("O");
  if (move === -1) move = findWinningMove("X");
  if (move === -1 && board[4] === "") move = 4;

  if (move === -1) {
    let corners = [0,2,6,8].filter(i => board[i] === "");
    if (corners.length) {
      move = corners[Math.floor(Math.random() * corners.length)];
    }
  }

  if (move === -1) {
    let empty = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
    move = empty[Math.floor(Math.random() * empty.length)];
  }

  board[move] = "O";
  currentPlayer = "X";

  checkGame();
  createBoard();
  updateStatus();
}

function findWinningMove(player) {
  for (let combo of winCombos) {
    const [a,b,c] = combo;
    const line = [board[a], board[b], board[c]];

    if (line.filter(x => x === player).length === 2 && line.includes("")) {
      if (board[a] === "") return a;
      if (board[b] === "") return b;
      if (board[c] === "") return c;
    }
  }
  return -1;
}

function checkGame() {
  for (let combo of winCombos) {
    const [a,b,c] = combo;

    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      gameActive = false;
      document.getElementById("status").innerText = board[a] + " wins!";

      highlightWin(combo);
      return;
    }
  }

  if (!board.includes("")) {
    gameActive = false;
    document.getElementById("status").innerText = "It's a draw!";
  }
}

function highlightWin(combo) {
  const cells = document.querySelectorAll(".cell");
  combo.forEach(i => cells[i].classList.add("winning"));
}

function updateStatus() {
  if (gameActive) {
    document.getElementById("status").innerText = "Turn: " + currentPlayer;
  }
}

function resetGame() {
  board = Array(9).fill("");
  currentPlayer = "X";
  gameActive = true;
  createBoard();
  updateStatus();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battle of the Symbols</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

/* TITLE */
.title {
  font-size: 48px;
  font-weight: 900;
  color: #38bdf8;
  margin-top: 30px;
  letter-spacing: 2px;
}

/* STREAK DISPLAY */
#streakBox {
  position: absolute;
  top: 10px;
  right: 15px;
  background: #0f172a;
  padding: 10px 15px;
  border-radius: 10px;
  border: 2px solid #38bdf8;
  font-size: 18px;
}

/* MENUS */
.menu {
  margin-top: 40px;
}

button {
  padding: 12px 18px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* DIFFICULTY */
.easy { background: #22c55e; color: black; }
.medium { background: #f59e0b; color: black; }
.hard { background: #ef4444; color: white; }
.impossible { background: #000; color: white; border: 2px solid white; }
.pvp { background: #38bdf8; color: black; }

/* BOARD */
.board {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 8px;
  justify-content: center;
  margin-top: 25px;
}

.cell {
  width: 110px;
  height: 110px;
  background: #1f2937;
  font-size: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 12px;
}

.cell:hover { background: #334155; }

.winning {
  background: #22c55e !important;
  color: black;
}

#status {
  margin-top: 20px;
  font-size: 22px;
  min-height: 30px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div id="streakBox">🔥 Streak: <span id="streak">0</span></div>

<div id="menu">
  <div class="title">BATTLE OF THE SYMBOLS!</div>

  <div class="menu">
    <button class="pvp" onclick="clickSound(); startMenu('pvp')">2 Player</button>
    <button class="easy" onclick="clickSound(); showAI()">Play vs AI</button>
  </div>
</div>

<div id="aiMenu" class="menu hidden">
  <button class="easy" onclick="clickSound(); startGame('easy')">Easy 🙂</button>
  <button class="medium" onclick="clickSound(); startGame('medium')">Intermediate 😐</button>
  <button class="hard" onclick="clickSound(); startGame('hard')">Hard 😡</button>
  <button class="impossible" onclick="clickSound(); startGame('impossible')">Impossible 💀</button>
</div>

<div id="game" class="hidden">
  <div class="board" id="board"></div>
  <div id="status"></div>

  <button onclick="clickSound(); resetGame()">Restart</button>
  <button onclick="clickSound(); goBack()" style="background:#64748b; color:white;">⬅ Back</button>
</div>

<script>

/* =========================
   STREAK SYSTEM
========================= */
let streak = 0;

/* =========================
   GAME STATE
========================= */
let board = Array(9).fill("");
let currentPlayer = "X";
let mode = "pvp";
let gameActive = true;

const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

/* =========================
   SOUND EFFECTS
========================= */
function clickSound() {
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
  audio.volume = 0.3;
  audio.play();
}

function moveSound() {
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
  audio.volume = 0.3;
  audio.play();
}

/* =========================
   MENU
========================= */
function startMenu(type) {
  mode = type;
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("aiMenu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  resetBoardOnly();
}

function showAI() {
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("aiMenu").classList.remove("hidden");
}

function goBack() {
  document.getElementById("game").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");

  resetBoardOnly();
  resetStreak();
}

/* =========================
   BOARD
========================= */
function createBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((val, i) => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.innerText = val;
    cell.onclick = () => makeMove(i);
    boardDiv.appendChild(cell);
  });
}

/* =========================
   RESET
========================= */
function resetBoardOnly() {
  board = Array(9).fill("");
  currentPlayer = "X";
  gameActive = true;
  createBoard();
  updateStatus();
}

function resetGame() {
  resetBoardOnly();
}

function resetStreak() {
  streak = 0;
  updateStreak();
}

function updateStreak() {
  document.getElementById("streak").innerText = streak;
}

/* =========================
   MOVES
========================= */
function makeMove(i) {
  if (!gameActive || board[i] !== "") return;

  board[i] = currentPlayer;
  moveSound();

  checkGame();

  if (!gameActive) {
    createBoard();
    return;
  }

  if (mode === "pvp") {
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    createBoard();
    updateStatus();
  } else {
    currentPlayer = "O";
    createBoard();
    updateStatus();
    setTimeout(aiMove, 250);
  }
}

/* =========================
   AI
========================= */
function aiMove() {
  if (!gameActive) return;

  let move;

  if (mode === "easy") move = easyAI();
  else if (mode === "medium") move = mediumAI();
  else if (mode === "hard") move = hardAI();
  else move = impossibleAI();

  board[move] = "O";
  moveSound();

  currentPlayer = "X";

  checkGame();
  createBoard();
  updateStatus();
}

/* EASY */
function easyAI() {
  if (board[4] === "") return 4;
  return randomMove();
}

/* MEDIUM */
function mediumAI() {
  if (Math.random() < 0.6) {
    let win = findBest("O");
    if (win !== -1) return win;

    let block = findBest("X");
    if (block !== -1) return block;

    if (board[4] === "") return 4;
  }
  return randomMove();
}

/* HARD */
function hardAI() {
  let move = findBest("O");
  if (move !== -1) return move;

  move = findBest("X");
  if (move !== -1) return move;

  if (board[4] === "") return 4;

  let corners = [0,2,6,8].filter(i => board[i] === "");
  if (corners.length) return corners[Math.floor(Math.random()*corners.length)];

  return randomMove();
}

/* IMPOSSIBLE */
function impossibleAI() {
  return minimax(board, "O").index;
}

/* MINIMAX */
function minimax(newBoard, player) {
  const avail = newBoard.map((v,i)=>v===""?i:null).filter(v=>v!==null);

  if (winner(newBoard,"X")) return {score:-10};
  if (winner(newBoard,"O")) return {score:10};
  if (avail.length===0) return {score:0};

  let moves=[];

  for(let i of avail){
    let move={index:i};
    newBoard[i]=player;

    if(player==="O"){
      move.score=minimax(newBoard,"X").score;
    }else{
      move.score=minimax(newBoard,"O").score;
    }

    newBoard[i]="";
    moves.push(move);
  }

  return moves.reduce((best,m)=>{
    return player==="O"
      ? (m.score>best.score?m:best)
      : (m.score<best.score?m:best);
  });
}

function winner(b,p){
  return winCombos.some(([a,b2,c])=>
    b[a]===p && b[b2]===p && b[c]===p
  );
}

/* RANDOM */
function randomMove(){
  let moves = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  return moves[Math.floor(Math.random()*moves.length)];
}

/* =========================
   WIN CHECK + STREAK
========================= */
function checkGame() {
  for (let combo of winCombos) {
    const [a,b,c] = combo;

    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      gameActive = false;
      document.getElementById("status").innerText = board[a] + " wins!";
      highlight(combo);

      if (board[a] === "X") {
        streak++;
        updateStreak();
      } else {
        resetStreak();
      }
      return;
    }
  }

  if (!board.includes("")) {
    gameActive = false;
    document.getElementById("status").innerText = "Draw!";
    resetStreak();
  }
}

function highlight(combo){
  document.querySelectorAll(".cell")
    .forEach(c=>c.classList.remove("winning"));

  combo.forEach(i=>{
    document.querySelectorAll(".cell")[i].classList.add("winning");
  });
}

/* =========================
   UI
========================= */
function updateStatus(){
  if(gameActive){
    document.getElementById("status").innerText =
      "Turn: " + currentPlayer;
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Battle of the Symbols</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:white; text-align:center; }
.title { font-size:48px; font-weight:900; color:#38bdf8; margin-top:30px; }
#gameStats { position:absolute; top:10px; right:15px; background:#0f172a; padding:10px 15px; border-radius:10px; border:2px solid #38bdf8; font-size:16px; display:none; }
button { padding:12px 18px; margin:10px; font-size:18px; border:none; border-radius:10px; cursor:pointer; font-weight:bold; transition:.2s; }
button:hover { transform:scale(1.05); }
.easy{background:#22c55e;color:black;} .medium{background:#f59e0b;color:black;} .hard{background:#ef4444;color:white;} .impossible{background:black;color:white;border:2px solid white;} .pvp{background:#38bdf8;color:black;}
.board { display:grid; grid-template-columns:repeat(3,110px); gap:8px; justify-content:center; margin-top:25px; }
.cell { width:110px; height:110px; background:#1f2937; font-size:45px; display:flex; align-items:center; justify-content:center; cursor:pointer; border-radius:12px; }
.cell:hover{background:#334155;}
.winning { background:#22c55e !important;color:black; }
#status{margin-top:20px;font-size:22px;}
.hidden{display:none;}
</style>
</head>
<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a6f3b2f6c.mp3?filename=soft-piano-ambient-112191.mp3" type="audio/mp3">
</audio>

<div id="gameStats">
🔥 Streak: <span id="streak">0</span> | 🏆 High Score: <span id="highScore">0</span>
</div>

<div id="menu">
  <div class="title">BATTLE OF THE SYMBOLS!</div>
  <button class="pvp" onclick="clickSound(); startGame('pvp')">2 Player</button>
  <button class="easy" onclick="clickSound(); showAI()">Play vs AI</button>
</div>

<div id="aiMenu" class="hidden">
  <button class="easy" onclick="clickSound(); startGame('easy')">Easy 🙂</button>
  <button class="medium" onclick="clickSound(); startGame('medium')">Intermediate 😐</button>
  <button class="hard" onclick="clickSound(); startGame('hard')">Hard 😡</button>
  <button class="impossible" onclick="clickSound(); startGame('impossible')">Impossible 💀</button>
</div>

<div id="game" class="hidden">
  <div class="board" id="board"></div>
  <div id="status"></div>
  <button onclick="clickSound(); resetGame()">Restart</button>
  <button onclick="clickSound(); backToMenu()">⬅ Back</button>
</div>

<script>
// STATS
let streak = 0;
let highScore = localStorage.getItem("highScore") || 0;
let musicStarted = false;
document.getElementById("highScore").innerText = highScore;

// GAME STATE
let board = Array(9).fill("");
let currentPlayer = "X";
let mode = "pvp";
let gameActive = true;
const winCombos=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

// SOUND
function clickSound(){let a=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");a.volume=0.3;a.play();}
function moveSound(){let a=new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");a.volume=0.3;a.play();}

// MENU FUNCTIONS
function showAI(){document.getElementById("menu").classList.add("hidden");document.getElementById("aiMenu").classList.remove("hidden");}
function startGame(selectedMode){
    mode=selectedMode;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("aiMenu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("gameStats").style.display="block";
    resetBoard();
    if(!musicStarted){let bgm=document.getElementById("bgm"); bgm.volume=0.3; bgm.play(); musicStarted=true;}
}
function backToMenu(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("aiMenu").classList.add("hidden");
    document.getElementById("gameStats").style.display="none";
    resetBoard(); streak=0; updateStats();
}

// BOARD
function createBoard(){
  const div=document.getElementById("board"); div.innerHTML="";
  board.forEach((val,i)=>{
    let cell=document.createElement("div");
    cell.className="cell";
    cell.innerText=val;
    cell.onclick=()=>makeMove(i);
    div.appendChild(cell);
  });
}
function resetBoard(){board=Array(9).fill("");currentPlayer="X";gameActive=true; createBoard(); document.getElementById("status").innerText="";}

// GAMEPLAY
function makeMove(i){
  if(!gameActive||board[i]!=="") return;
  board[i]=currentPlayer; moveSound(); checkWin();
  if(!gameActive){createBoard(); return;}
  if(mode==="pvp"){currentPlayer=currentPlayer==="X"?"O":"X"; createBoard();}
  else{currentPlayer="O"; createBoard(); setTimeout(aiMove,200);}
}

// AI FUNCTIONS
function aiMove(){if(!gameActive) return; let move;
if(mode==="easy") move=easyAI();
else if(mode==="medium") move=mediumAI();
else if(mode==="hard") move=hardAI();
else move=impossibleAI();
board[move]="O"; moveSound(); currentPlayer="X"; checkWin(); createBoard();}

function easyAI(){if(board[4]==="") return 4; return randomMove();}
function mediumAI(){let w=findBest("O"); if(w!==-1) return w; let b=findBest("X"); if(b!==-1) return b; if(Math.random()<0.5 && board[4]==="") return 4; return randomMove();}
function hardAI(){let w=findBest("O"); if(w!==-1) return w; let b=findBest("X"); if(b!==-1) return b; if(board[4]==="") return 4; let corners=[0,2,6,8].filter(i=>board[i]===""); if(corners.length) return corners[Math.floor(Math.random()*corners.length)]; return randomMove();}
function impossibleAI(){return minimax(board,"O").index;}
function randomMove(){let moves=board.map((v,i)=>v===""?i:null).filter(v=>v!==null); return moves[Math.floor(Math.random()*moves.length)];}
function findBest(player){for(let combo of winCombos){let [a,b,c]=combo; let line=[board[a],board[b],board[c]]; if(line.filter(v=>v===player).length===2 && line.includes("")) return [a,b,c][line.indexOf("")];} return -1;}

// MINIMAX
function minimax(newBoard,player){
  let avail=newBoard.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  if(winner(newBoard,"X")) return {score:-10};
  if(winner(newBoard,"O")) return {score:10};
  if(avail.length===0) return {score:0};
  let moves=[];
  for(let i of avail){
    let move={index:i}; newBoard[i]=player; let result=player==="O"?minimax(newBoard,"X"):minimax(newBoard,"O"); move.score=result.score; newBoard[i]=""; moves.push(move);
  }
  return moves.reduce((best,m)=>player==="O"? (m.score>best.score?m:best):(m.score<best.score?m:best));
}
function winner(b,p){return winCombos.some(([a,b2,c])=>b[a]===p && b[b2]===p && b[c]===p);}

// WIN CHECK & STREAK
function checkWin(){
  for(let combo of winCombos){
    const [a,b,c]=combo;
    if(board[a]&&board[a]===board[b]&&board[a]===board[c]){
      gameActive=false; document.getElementById("status").innerText=board[a]+" wins!";
      highlight(combo);
      if(board[a]==="X") streak++; else streak=0;
      updateStats(); return;
    }
  }
  if(!board.includes("")){
    gameActive=false; document.getElementById("status").innerText="Draw!"; streak=0; updateStats();
  }
}
function highlight(combo){document.querySelectorAll(".cell").forEach(c=>c.classList.remove("winning")); combo.forEach(i=>document.querySelectorAll(".cell")[i].classList.add("winning"));}

// UPDATE STATS
function updateStats(){document.getElementById("streak").innerText=streak; if(streak>highScore){highScore=streak; localStorage.setItem("highScore",highScore);} document.getElementById("highScore").innerText=highScore;}

// RESTART
function resetGame(){resetBoard();}

createBoard(); updateStats();
</script>
</body>
</html>

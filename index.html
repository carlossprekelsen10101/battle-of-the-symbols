<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Noughts & Crosses</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

h1 { margin-top: 25px; }

/* MENU */
.menu {
  margin-top: 40px;
}

button {
  padding: 12px 18px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* DIFFICULTY COLOURS */
.easy { background: #22c55e; color: black; }
.medium { background: #f59e0b; color: black; }
.hard { background: #ef4444; color: white; }
.pvp { background: #38bdf8; color: black; }

/* BOARD */
.board {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  gap: 8px;
  justify-content: center;
  margin-top: 25px;
}

.cell {
  width: 110px;
  height: 110px;
  background: #1f2937;
  font-size: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 12px;
}

.cell:hover {
  background: #334155;
}

.winning {
  background: #22c55e !important;
  color: black;
}

#status {
  margin-top: 20px;
  font-size: 22px;
  min-height: 30px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>🎮 Noughts & Crosses</h1>

<!-- MAIN MENU -->
<div id="menu" class="menu">
  <button class="pvp" onclick="startMode('pvp')">2 Player</button>
  <button class="easy" onclick="showAI()">Play vs AI</button>
</div>

<!-- AI MENU -->
<div id="aiMenu" class="menu hidden">
  <button class="easy" onclick="startMode('easy')">Easy</button>
  <button class="medium" onclick="startMode('medium')">Intermediate</button>
  <button class="hard" onclick="startMode('hard')">Hard</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <div class="board" id="board"></div>
  <div id="status"></div>
  <button onclick="resetGame()">Restart</button>
</div>

<script>
let board = Array(9).fill("");
let currentPlayer = "X";
let mode = "pvp";
let gameActive = true;

const winCombos = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

/* =========================
   MENU CONTROL
========================= */
function showAI() {
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("aiMenu").classList.remove("hidden");
}

function startMode(selectedMode) {
  mode = selectedMode;

  document.getElementById("menu").classList.add("hidden");
  document.getElementById("aiMenu").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  createBoard();
  updateStatus();
}

/* =========================
   BOARD
========================= */
function createBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((val, i) => {
    const cell = document.createElement("div");
    cell.classList.add("cell");
    cell.innerText = val;
    cell.addEventListener("click", () => makeMove(i));
    boardDiv.appendChild(cell);
  });
}

/* =========================
   PLAYER MOVE
========================= */
function makeMove(i) {
  if (!gameActive || board[i] !== "") return;

  board[i] = currentPlayer;
  checkGame();

  if (!gameActive) {
    createBoard();
    return;
  }

  if (mode === "pvp") {
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    createBoard();
    updateStatus();
  } else {
    currentPlayer = "O";
    createBoard();
    updateStatus();
    setTimeout(aiMove, 300);
  }
}

/* =========================
   AI MOVE CONTROLLER
========================= */
function aiMove() {
  if (!gameActive) return;

  let move;

  if (mode === "easy") {
    move = easyAI();
  } 
  else if (mode === "medium") {
    move = mediumAI();
  } 
  else {
    move = hardAI();
  }

  board[move] = "O";
  currentPlayer = "X";

  checkGame();
  createBoard();
  updateStatus();
}

/* =========================
   EASY AI (weaker but not random only)
========================= */
function easyAI() {
  // tries center first, then random
  if (board[4] === "") return 4;

  let moves = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
  return moves[Math.floor(Math.random() * moves.length)];
}

/* =========================
   MEDIUM AI (intermediate)
   - blocks wins
   - sometimes misses wins
========================= */
function mediumAI() {
  // 50% chance to play smart, 50% random
  if (Math.random() < 0.5) {
    let winMove = findBest("O");
    if (winMove !== -1) return winMove;

    let blockMove = findBest("X");
    if (blockMove !== -1) return blockMove;

    if (board[4] === "") return 4;
  }

  let moves = board.map((v,i) => v === "" ? i : null).filter(v => v !== null);
  return moves[Math.floor(Math.random() * moves.length)];
}

/* =========================
   HARD AI (strong logic)
========================= */
function hardAI() {
  let move = findBest("O");
  if (move !== -1) return move;

  move = findBest("X");
  if (move !== -1) return move;

  if (board[4] === "") return 4;

  let corners = [0,2,6,8].filter(i => board[i] === "");
  if (corners.length) return corners[Math.floor(Math.random() * corners.length)];

  return easyAI();
}

/* =========================
   FIND WIN / BLOCK
========================= */
function findBest(player) {
  for (let combo of winCombos) {
    const [a,b,c] = combo;
    const line = [board[a], board[b], board[c]];

    if (line.filter(x => x === player).length === 2 && line.includes("")) {
      if (board[a] === "") return a;
      if (board[b] === "") return b;
      if (board[c] === "") return c;
    }
  }
  return -1;
}

/* =========================
   WIN CHECK
========================= */
function checkGame() {
  for (let combo of winCombos) {
    const [a,b,c] = combo;

    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      gameActive = false;
      document.getElementById("status").innerText = board[a] + " wins!";
      highlight(combo);
      return;
    }
  }

  if (!board.includes("")) {
    gameActive = false;
    document.getElementById("status").innerText = "Draw!";
  }
}

function highlight(combo) {
  const cells = document.querySelectorAll(".cell");
  combo.forEach(i => cells[i].classList.add("winning"));
}

/* =========================
   UI
========================= */
function updateStatus() {
  if (gameActive) {
    document.getElementById("status").innerText = "Turn: " + currentPlayer;
  }
}

function resetGame() {
  board = Array(9).fill("");
  currentPlayer = "X";
  gameActive = true;
  createBoard();
  updateStatus();
}
</script>

</body>
</html>
